<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- TODO: Set the document title to the name of your application -->
  <title>Placement Navigator</title>
  <meta name="description" content="College Placement Management System" />
  <meta name="author" content="Zenetive" />

  <meta property="og:title" content="Placement Navigator" />
  <meta property="og:description" content="College Placement Management System" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500&family=Playfair+Display:wght@600;700&family=Poppins:wght@600;700&family=Roboto:wght@400&family=Sora:wght@600&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    window.addEventListener('error', function(e) {
      document.body.innerHTML += '<div style="color:#ffcccc;padding:40px;font-family:monospace;z-index:99999;position:fixed;top:0;left:0;background:#990000;width:100vw;height:100vh;overflow:auto;">' + 
        '<h2>REACT CRASH TRACER</h2>' +
        '<p style="font-size: 1.2rem; font-weight: bold;">' + e.message + '</p>' +
        '<p>' + e.filename + ':' + e.lineno + '</p>' +
        '<pre style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px;">' + (e.error && e.error.stack) + '</pre>' +
      '</div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.body.innerHTML += '<div style="color:#ffcccc;padding:40px;font-family:monospace;z-index:99999;position:fixed;top:0;left:0;background:#990000;width:100vw;height:100vh;overflow:auto;">' + 
        '<h2>REACT PROMISE REJECTION TRACER</h2>' +
        '<p style="font-size: 1.2rem; font-weight: bold;">' + e.reason + '</p>' +
        '<pre style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px;">' + (e.reason && e.reason.stack) + '</pre>' +
      '</div>';
    });
  </script>
</body>

</html>
